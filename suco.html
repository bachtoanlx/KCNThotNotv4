<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo Cáo Sự Cố - KCN Thốt Nốt</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    html,
    body {
      height: 100vh;
      height: 100dvh;
      overflow-x: hidden;
    }

    #pageContent {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px 8px;
    }

    @media (max-width: 768px) {
      html, body {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }

      body #pageContent {
        height: 100% !important;
        min-height: 0 !important;
        flex: 1 1 0% !important;
        overflow: hidden !important;
        display: flex !important;
        flex-direction: column !important;
        padding: 5px 0px !important;
      }

      #pageContent > h2,
      #pageContent > p {
        padding-left: 8px;
        padding-right: 8px;
      }

      .suco-layout {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 0 8px 10px 8px;
      }
    }

    @media (min-width: 769px) {
      #pageContent {
        overflow: hidden !important;
        /* Khóa cuộn cấp trang chính */
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .suco-layout {
        flex: 1;
        min-height: 0;
        /* Bắt buộc để kích hoạt cơ chế cuộn trong flexbox */
      }

      .suco-left {
        height: 100%;
        min-height: 0;
        overflow-y: auto;
        /* Tự động cuộn form nếu chiều cao màn hình quá thấp */
      }

      .suco-right {
        height: 100%;
        min-height: 0;
        overflow-y: auto;
        /* Chỉ cho phép cuộn độc lập cột danh sách bên phải */
        padding-right: 8px;
        /* Tránh để thanh cuộn đè sát mép thẻ */
      }
    }
  </style>
</head>

<body>
  <div id="menu-placeholder"></div>
  <div id="loading-placeholder"></div>

  <div id="notLogged"
    style="display:none; padding: 20px; color: var(--danger-color); font-weight: bold; font-size: 1.2rem;">
    <a href="trangchu.html">❌ Bạn cần đăng nhập để truy cập trang này. Quay lại trang chủ.</a>
  </div>

  <div id="pageContent" style="display:none;">
    <h2 style="color: var(--primary-color); display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
      🛠️ Báo Cáo Sự Cố Thiết Bị
    </h2>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 15px;">
      Gửi báo cáo khi phát hiện hỏng hóc, lỗi vận hành.
    </p>

    <div class="suco-layout">
      <!-- Cột bên trái: Biểu mẫu báo lỗi sự cố -->
      <div class="suco-left">
        <form id="incidentForm">
          <div class="form-group form-field">
            <label for="device-select">Thiết bị hỏng hóc:</label>
            <select class="form-control" id="device-select" required>
              <option value="" disabled selected>- Chọn thiết bị -</option>
              <option value="Bơm chìm nước thải">Bơm chìm nước thải</option>
              <option value="Bơm bùn tuần hoàn">Bơm bùn tuần hoàn</option>
              <option value="Bơm chìm bể Aerobic">Bơm chìm bể Aerobic</option>
              <option value="Bơm định lượng PAC">Bơm định lượng PAC</option>
              <option value="Bơm định lượng Chlorine">Bơm định lượng Chlorine</option>
              <option value="Máy thổi khí">Máy thổi khí</option>
              <option value="Cánh khuấy chìm">Cánh khuấy chìm</option>
              <option value="Cảm biến pH đầu ra">Cảm biến pH đầu ra</option>
              <option value="Cảm biến DO bể Aerobic">Cảm biến DO bể Aerobic</option>
              <option value="Tủ điều khiển trung tâm">Tủ điều khiển trung tâm</option>
              <option value="new_device">- Thiết bị khác... -</option>
            </select>
          </div>

          <!-- Nhập tên thiết bị khác nếu chọn new_device -->
          <div class="form-group form-field" id="new-device-group" style="display: none;">
            <label for="new-device-name">Tên thiết bị phụ / khác:</label>
            <input type="text" class="form-control" id="new-device-name" placeholder="Ví dụ: Bơm cấp nước số 3...">
          </div>

          <div class="form-group form-field">
            <label for="incident-desc">Mô tả sự cố chi tiết:</label>
            <textarea class="form-control" id="incident-desc" style="min-height: 100px;"
              placeholder="Mô tả hiện tượng lỗi..." required></textarea>
          </div>

          <div class="form-group form-field">
            <label for="incident-severity">Mức độ nghiêm trọng:</label>
            <select class="form-control" id="incident-severity" required>
              <option value="low" selected>🟢 Thấp - Không ảnh hưởng đến vận hành</option>
              <option value="medium">🟡 Trung bình - Cần khắc phục sớm</option>
              <option value="critical">🔴 Khẩn cấp - Ảnh hưởng lớn đến vận hành</option>
              </option>
            </select>
          </div>

          <div class="form-group form-field">
            <label for="file">Chọn hình ảnh sự cố:</label>
            <input type="file" id="file" class="form-control-file" accept="image/*" style="display: none;">
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
              <button type="button" id="customFileBtn"
                style="padding: 6px 12px; border: 1px solid #ced4da; background: #e9ecef; border-radius: 0.25rem; cursor: pointer; font-size: 14px; color: #495057;">Chọn
                tệp</button>
              <span id="customFileName"
                style="color: #666; font-style: italic; cursor: default; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; font-size: 14px;">Không
                có tệp nào được chọn</span>
            </div>
          </div>

          <div class="form-group text-center" style="margin-top: 15px;">
            <button type="submit" class="submit-btn" style="background-color: var(--primary-color);">
              🚀 Gửi Báo Cáo Sự Cố
            </button>
          </div>
        </form>
      </div>

      <!-- Cột bên phải: Danh sách sự cố & cập nhật trạng thái -->
      <div class="suco-right">
        <h2 style="color: var(--primary-color); display: flex; align-items: center; gap: 8px; margin-bottom: 5px;">
          📋 Danh Sách Sự Cố & Tiến Độ Khắc Phục
        </h2>

        <!-- Khung bộ lọc sự cố -->
        <div class="filter-box" style="margin-bottom: 15px;">
          <label>Trạng thái:
            <select id="filter-status">
              <option value="all">Tất cả trạng thái</option>
              <option value="active" selected>⚠️ Đang diễn ra</option>
              <option value="pending">Chờ xử lý</option>
              <option value="fixing">Đang sửa chữa</option>
              <option value="resolved">Đã khắc phục xong</option>
            </select>
          </label>
          <label>Mức độ:
            <select id="filter-severity">
              <option value="all">Tất cả mức độ</option>
              <option value="critical">🔴 Khẩn cấp</option>
              <option value="medium">🟡 Trung bình</option>
              <option value="low">🟢 Thấp</option>
            </select>
          </label>
        </div>

        <!-- Lưới phiếu sự cố -->
        <div class="ticket-grid" id="ticket-grid">
          <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">
            Đang tải danh sách sự cố...
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script type="module" src="suco.js"></script>
</body>

</html>
