<!DOCTYPE html>
<html lang="vi">

<head>
  <!-- PWA & Mobile Fullscreen -->
  <link rel='manifest' href='manifest.json'>
  <meta name='theme-color' content='#273668'>
  <meta name='apple-mobile-web-app-capable' content='yes'>
  <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>
  <meta name='apple-mobile-web-app-title' content='QL KCN'>
  <link rel='apple-touch-icon' href='https://cdn-icons-png.flaticon.com/512/6846/6846274.png'>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo Cáo Sự Cố - KCN Thốt Nốt</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    #pageContent {
      padding: 10px 8px;
    }

    @media (max-width: 768px) {
      body #pageContent {
        padding: 5px 0px !important;
      }

      .suco-header {
        padding-left: 8px;
        padding-right: 8px;
      }

      .suco-layout {
        padding: 0 8px 10px 8px;
      }
    }
  </style>
</head>

<body class="fixed-viewport-layout">
  <div id="menu-placeholder"></div>
  <div id="loading-placeholder"></div>

  <div id="notLogged"
    style="display:none; padding: 20px; color: var(--danger-color); font-weight: bold; font-size: 1.2rem;">
    <a href="trangchu.html">❌ Bạn cần đăng nhập để truy cập trang này.</a>
  </div>

  <div id="pageContent" style="display:none;">
    <div class="suco-header"
      style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px; margin-bottom: 5px;">
      <div>
        <h2 style="color: var(--primary-color); display: flex; align-items: center; gap: 8px; margin: 0 0 5px 0;">
          🛠️ Báo Cáo Sự Cố Thiết Bị
        </h2>
        <p style="color: #64748b; font-size: 0.9rem; margin: 0;">
          Gửi báo cáo khi phát hiện hỏng hóc, lỗi vận hành.
        </p>
      </div>

      <!-- Khung bộ lọc sự cố -->
      <div class="filter-box" style="margin: 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
        <label
          style="display: flex; align-items: center; gap: 5px; margin: 0; font-size: 14px; color: #475569; font-weight: 500;">Trạng
          thái:
          <select id="filter-status"
            style="height: 33px; padding: 4px 8px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; background: #fff;">
            <option value="all">Tất cả trạng thái</option>
            <option value="active" selected>⚠️ Đang diễn ra</option>
            <option value="pending">Chờ xử lý</option>
            <option value="fixing">Đang sửa chữa</option>
            <option value="resolved">Đã khắc phục xong</option>
          </select>
        </label>
        <label
          style="display: flex; align-items: center; gap: 5px; margin: 0; font-size: 14px; color: #475569; font-weight: 500;">Mức
          độ:
          <select id="filter-severity"
            style="height: 33px; padding: 4px 8px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; background: #fff;">
            <option value="all">Tất cả mức độ</option>
            <option value="critical">🔴 Khẩn cấp</option>
            <option value="medium">🟡 Trung bình</option>
            <option value="low">🟢 Thấp</option>
          </select>
        </label>
      </div>
    </div>

    <div class="suco-layout">
      <!-- Cột bên trái: Biểu mẫu báo lỗi sự cố -->
      <div class="suco-left">
        <form id="incidentForm">
          <div class="form-group form-field">
            <label for="device-select">Thiết bị hỏng hóc:</label>
            <select class="form-control" id="device-select" required>
              <option value="" disabled selected>- Đang tải danh sách thiết bị... -</option>
            </select>
          </div>

          <!-- Nhập tên thiết bị khác nếu chọn new_device -->
          <div class="form-group form-field" id="new-device-group" style="display: none;">
            <label for="new-device-name">Tên thiết bị phụ / khác:</label>
            <input type="text" class="form-control" id="new-device-name" placeholder="Ví dụ: Bơm cấp nước số 3...">
          </div>

          <div class="form-group form-field">
            <label for="incident-desc">Mô tả sự cố chi tiết:</label>
            <textarea class="form-control" id="incident-desc" style="min-height: 100px;"
              placeholder="Mô tả hiện tượng lỗi..." required></textarea>
          </div>

          <div class="form-group form-field">
            <label for="incident-severity">Mức độ nghiêm trọng:</label>
            <select class="form-control" id="incident-severity" required>
              <option value="low" selected>🟢 Thấp - Không ảnh hưởng đến vận hành</option>
              <option value="medium">🟡 Trung bình - Cần khắc phục sớm</option>
              <option value="critical">🔴 Khẩn cấp - Ảnh hưởng lớn đến vận hành</option>
            </select>
          </div>

          <div class="form-group form-field">
            <label for="file">Chọn hình ảnh sự cố <small style="color:#94a3b8;">(tối đa 3 ảnh)</small>:</label>
            <input type="file" id="file" class="form-control-file" accept="image/*" multiple style="display: none;">
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
              <button type="button" id="customFileBtn"
                style="padding: 6px 12px; border: 1px solid #ced4da; background: #e9ecef; border-radius: 0.25rem; cursor: pointer; font-size: 14px; color: #495057; white-space: nowrap;">📎
                Chọn ảnh</button>
              <span id="customFileName" style="color: #666; font-style: italic; cursor: default; font-size: 13px;">Chưa
                chọn ảnh nào</span>
            </div>
            <!-- Dải preview thumbnail ảnh đã chọn -->
            <div id="imagePreviewStrip" style="display:none; margin-top:8px; display:flex; flex-wrap:wrap; gap:8px;">
            </div>
          </div>

          <div class="form-group text-center" style="margin-top: 15px;">
            <button type="submit" class="submit-btn" style="background-color: var(--primary-color);">
              🚀 Gửi Báo Cáo Sự Cố
            </button>
          </div>
        </form>
      </div>

      <!-- Cột bên phải: Danh sách sự cố & cập nhật trạng thái -->
      <div class="suco-right">
        <!-- Lưới phiếu sự cố -->
        <div class="ticket-grid" id="ticket-grid">
          <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">
            Đang tải danh sách sự cố...
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script type="module" src="suco.js"></script>
</body>

</html>
