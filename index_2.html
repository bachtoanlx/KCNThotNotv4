<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gửi báo cáo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    /* Tinh chỉnh layout để lấp đầy màn hình và bỏ cuộn trang */
    html, body {
        height: 100vh;
        overflow: hidden;
    }

    #pageContent {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
    }

    .form-style-1 {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
    }

    .card-body {
        flex: 1;
        overflow-y: auto; /* Cho phép cuộn nội dung form nếu dài */
        overflow-x: hidden; /* Ngăn cuộn ngang không mong muốn */
        padding-bottom: 20px;
    }

    /* Tối ưu khoảng cách cho màn hình máy tính để tránh cuộn */
    @media (min-width: 768px) {
        .card-body {
            padding-top: 10px !important;
            padding-bottom: 10px !important;
        }
        form {
            padding: 15px 20px !important;
            margin-bottom: 15px !important;
        }
        .form-field {
            margin-bottom: 12px !important;
        }
    }
  </style>
</head>
<body>
  <div id="menu-placeholder"></div>
  <div id="loading-placeholder"></div>
  <div id="alert-placeholder"></div>

  <div id="notLogged" style="display:none;">
    ❌ Bạn cần đăng nhập để truy cập trang này.
  </div>

  <div id="pageContent" style="display:none;">
    <div class="form-style-1">          
      <div class="card-body">
        <form id="registrationForm_2" data-collection="reports_2" data-folder-id="1548M2LcAD4FETW65VPDHaHxs-b33HVaq" 
              onsubmit="submitForm(event, this.id, this.dataset.collection, this.dataset.folderId)" style="margin-bottom: 15px;">
          <div class="form-group form-field">
            <label for="c_ty">Tên Công ty:</label>
            <select class="form-control" id="c_ty" name="c_ty" required>
              <option value="" disabled selected>- Đang tải danh sách... -</option>
            </select>
          </div>
          <div class="form-group form-field">
            <label for="ngay_nghi">Ngày nghỉ:</label>
            <input type="text" class="form-control" placeholder=" Cho phép chọn nhiều ngày..." id="ngay_nghi" name="ngay_nghi">
          </div>
          <div class="form-group form-field">
            <label for="ngay_lam_db">Ngày làm đặc biệt:</label>
            <input type="text" class="form-control" placeholder=" Ngày, tháng, năm ... " id="ngay_lam_db" name="ngay_lam_db">
          </div>
          <div class="form-group form-field">
            <label for="ghi_chu">Ghi chú:</label>
            <textarea class="form-control" placeholder="" id="ghi_chu" name="ghi_chu"></textarea>
          </div>
          <div class="form-group form-field">
            <label for="file">Đính kèm thông báo</label>
            <input type="file" id="file_2" class="form-control-file" accept="image/*" style="display: none;">
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                <button type="button" id="customFileBtn_2" style="padding: 6px 12px; border: 1px solid #ced4da; background: #e9ecef; border-radius: 0.25rem; cursor: pointer; font-size: 1rem; color: #495057;">Chọn tệp</button>
                <span id="customFileName_2" style="color: #666; font-style: italic; cursor: default;">Không có tệp nào được chọn</span>
            </div>
          </div>
        </form>
        <div class="form-group text-center">
          <button type="submit" class="submit-btn" form="registrationForm_2">Gửi thông tin</button>
        </div>    
      </div>
    </div>
  </div>
<div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script type="module">
    import { collection, getDocs, addDoc, deleteDoc, doc, query, where, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { onAuth, addReport, showLoading, hideLoading, showSwal, promptForReAuth, db, getRole, showConfirmSwal, loadCompanyDropdown } from "./script.js";
    import { initMenu } from "./menu.js";

    let fpNgayLamDB; 
    let userRole = null;
    let loggedInUserEmail = null; 

    // ================== MENU + MODAL ==================
    fetch("menu.html").then(r => r.text()).then(h => {
      document.getElementById("menu-placeholder").innerHTML = h;
      initMenu();
    });
    fetch("modal.html").then(r => r.text()).then(h => {
      document.getElementById("loading-placeholder").innerHTML = h;
    });
    // TẢI FOOTER (thêm đoạn này vào)
    fetch("footer.html").then(r => r.text()).then(h => {
        document.getElementById("footer-placeholder").innerHTML = h;
    });

    const notLogged = document.getElementById("notLogged");
    const content = document.getElementById("pageContent");

    // ================== CHECK LOGIN ==================
    onAuth(user => {
      // Logic check login
      if (user) {
        notLogged.style.display = "none";
        content.style.display = "flex"; /* Dùng flex để layout hoạt động tốt với CSS mới */
        // Tự động tải danh sách tất cả các công ty
        loadCompanyDropdown('c_ty', 'all');
      } else {
        notLogged.style.display = "flex";
        content.style.display = "none";
      }
    });

    // ================== FLATPICKR ==================
    function capitalizeFirstLetter(str) {
      if (!str) return "";
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    document.addEventListener('DOMContentLoaded', function() {
      // Logic khởi tạo flatpickr
      flatpickr("#ngay_nghi", {
        mode: "multiple",
        dateFormat: "Y-m-d",
      });

      const inputField = document.getElementById('ghi_chu');
      inputField.addEventListener('input', function() {
        inputField.value = capitalizeFirstLetter(inputField.value);
      });

      fpNgayLamDB = flatpickr("#ngay_lam_db", {
        dateFormat: "Y-m-d",
        maxDate: "today",
        allowInput: true,
        disableMobile: "true",
        clickOpens: false
      });

      const ngayLamDBInput = document.getElementById("ngay_lam_db");
      ngayLamDBInput.addEventListener("click", async function (e) {
        e.preventDefault();
        const isVerified = await promptForReAuth();
        if (isVerified) {
          fpNgayLamDB.open();
        } else {
          ngayLamDBInput.blur();
        }
      });
    });

    // Logic xem trước hình ảnh (Tương tự index.html)
    const fileInput = document.getElementById('file_2');
    const customFileBtn = document.getElementById('customFileBtn_2');
    const customFileName = document.getElementById('customFileName_2');
    let currentImageBase64 = null;

    if (fileInput && customFileBtn && customFileName) {
        // Kích hoạt input file khi nhấn nút Chọn tệp
        customFileBtn.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageBase64 = e.target.result;
                    // Cập nhật giao diện khi có file
                    customFileName.textContent = file.name;
                    customFileName.style.color = "#007bff";
                    customFileName.style.fontStyle = "normal";
                    customFileName.style.fontWeight = "bold";
                    customFileName.style.textDecoration = "underline";
                    customFileName.style.cursor = "pointer";
                    customFileName.title = "Nhấn để xem ảnh lớn";
                }
                reader.readAsDataURL(file);
            } else {
                // Reset về trạng thái ban đầu
                currentImageBase64 = null;
                customFileName.textContent = "Không có tệp nào được chọn";
                customFileName.style.color = "#666";
                customFileName.style.fontStyle = "italic";
                customFileName.style.fontWeight = "normal";
                customFileName.style.textDecoration = "none";
                customFileName.style.cursor = "default";
                customFileName.title = "";
            }
        });

        // Sự kiện click vào tên file để xem ảnh
        customFileName.addEventListener('click', function() {
                if (currentImageBase64) {
                    Swal.fire({
                        imageUrl: currentImageBase64,
                        imageAlt: 'Xem trước hình ảnh',
                        showCloseButton: true,
                        showConfirmButton: false,
                        width: 'auto',
                        padding: '10px',
                        backdrop: `rgba(0,0,0,0.8)`
                    });
                }
        });
    }

    // Tự động xóa preview sau khi gửi thành công (khi form được reset)
    const originalSubmitForm = window.submitForm;
    if (originalSubmitForm) {
        window.submitForm = async function(e, formId, collectionName, folderId) {
            await originalSubmitForm(e, formId, collectionName, folderId);
            // Nếu form đã được reset (file input rỗng), xóa preview
            if (fileInput && fileInput.files.length === 0) {
                currentImageBase64 = null;
                if (customFileName) {
                    customFileName.textContent = "Không có tệp nào được chọn";
                    customFileName.style.color = "#666";
                    customFileName.style.fontStyle = "italic";
                    customFileName.style.fontWeight = "normal";
                    customFileName.style.textDecoration = "none";
                    customFileName.style.cursor = "default";
                    customFileName.title = "";
                }
            }
        };
    }
    // ================== CHECK ADMIN ==================
    onAuth(async (user) => {
      console.log("onAuth callback:", user);
      // Logic check admin
      if (!user) {
        userRole = null;
        loggedInUserEmail = null;   // <--- reset khi chưa login
        return;
      }
      try { userRole = await getRole(user.email); }
      catch(e){ userRole = null; }

      loggedInUserEmail = user.email;  // <--- lưu lại email user đang đăng nhập
    });

  </script>
</body>
</html>
