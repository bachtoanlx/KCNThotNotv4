<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- PWA & Mobile Fullscreen -->
  <link rel='manifest' href='manifest.json'>
  <meta name='theme-color' content='#273668'>
  <meta name='apple-mobile-web-app-capable' content='yes'>
  <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>
  <meta name='apple-mobile-web-app-title' content='QL KCN'>
  <link rel='apple-touch-icon' href='https://cdn-icons-png.flaticon.com/512/6846/6846274.png'>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gửi báo cáo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    /* Tinh chỉnh layout để lấp đầy màn hình và bỏ cuộn trang */
    html, body {
        height: 100vh;
        overflow: hidden;
    }

    #pageContent {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
    }

    .form-style-1 {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
    }

    .card-body {
        flex: 1;
        overflow-y: auto; /* Cho phép cuộn nội dung form nếu dài */
        overflow-x: hidden; /* Ngăn cuộn ngang không mong muốn */
        padding-bottom: 20px;
    }

    /* Tối ưu khoảng cách cho màn hình máy tính để tránh cuộn */
    @media (min-width: 768px) {
        .card-body {
            padding-top: 10px !important;
            padding-bottom: 10px !important;
        }
        form {
            padding: 15px 20px !important;
            margin-bottom: 15px !important;
        }
        .form-field {
            margin-bottom: 12px !important;
        }
    }
  </style>
</head>
<body>
  <div id="menu-placeholder"></div>
  <div id="loading-placeholder"></div>
  <div id="alert-placeholder"></div>

  <div id="notLogged" style="display:none;">
    <a href="trangchu.html">❌ Bạn cần đăng nhập để truy cập trang này.</a>
  </div>

  <div id="pageContent" style="display:none;">
    <div class="form-style-1">          
      <div class="card-body">
        <form id="registrationForm_2" data-collection="reports_2" data-folder-id="1548M2LcAD4FETW65VPDHaHxs-b33HVaq" 
              onsubmit="submitForm(event, this.id, this.dataset.collection, this.dataset.folderId)" style="margin-bottom: 15px;">
          <div class="form-group form-field">
            <label for="c_ty">Tên Công ty:</label>
            <select class="form-control" id="c_ty" name="c_ty" required>
              <option value="" disabled selected>- Đang tải danh sách... -</option>
            </select>
          </div>
          <div class="form-group form-field">
            <label for="ngay_nghi">Ngày nghỉ:</label>
            <input type="text" class="form-control" placeholder=" Cho phép chọn nhiều ngày..." id="ngay_nghi" name="ngay_nghi">
          </div>
          <div class="form-group form-field">
            <label for="ngay_lam_db">Ngày làm đặc biệt:</label>
            <input type="text" class="form-control" placeholder=" Ngày, tháng, năm ... " id="ngay_lam_db" name="ngay_lam_db">
          </div>
          <div class="form-group form-field">
            <label for="ghi_chu">Ghi chú:</label>
            <textarea class="form-control" placeholder="" id="ghi_chu" name="ghi_chu"></textarea>
          </div>
          <div class="form-group form-field">
            <label for="file">Đính kèm thông báo</label>
            <input type="file" id="file_2" class="form-control-file" accept="image/*" style="display: none;">
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                <button type="button" id="customFileBtn_2" style="padding: 6px 12px; border: 1px solid #ced4da; background: #e9ecef; border-radius: 0.25rem; cursor: pointer; font-size: 14px; color: #495057;">Chọn tệp</button>
                <span id="customFileName_2" style="color: #666; font-style: italic; cursor: default; font-size: 14px;">Không có tệp nào được chọn</span>
            </div>
          </div>
        </form>
        <div class="form-group text-center">
          <button type="submit" class="submit-btn" form="registrationForm_2">Gửi thông tin</button>
        </div>    
      </div>
    </div>
  </div>
<div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script type="module" src="index_2.js"></script>
    
</body>
</html>
