    table {

    #reportTable td:not(:first-child) { text-align: center; } 
    
    th, td {

/* ================= TOGGLE SWITCH 3 NẤC ================= */
:root {
  --toggle-height: 35px;       /* Chiều cao công tắc */
  --label-width: 85px;        /* Chiều rộng mỗi nấc */
  --gap: 2px;                  /* Khoảng cách giữa các nấc */
  --accent1: var(--focus-color);
  --accent2: var(--primary-color);
  --muted: #dbe9f8;
  --text: var(--primary-color);
}

/* Container chính */
.switch-3-n {
  position: relative;
  display: flex;
  width: calc(var(--label-width) * 3 + var(--gap) * 2);
  height: var(--toggle-height);
  border-radius: 999px;
  background: #f0f6ff;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.05);
  padding: 4px;
  overflow: hidden;
  user-select: none;
}

/* Ẩn input radio */
.switch-3-n input[type="radio"] {
  display: none;
}

/* Label hiển thị text */
.switch-3-n label {
  flex: 0 0 var(--label-width);
  display: flex;                /* Dùng flexbox */
  align-items: center;          /* Căn giữa dọc */
  justify-content: center;      /* Căn giữa ngang */
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  z-index: 3;
  color: var(--text);
  transition: color 0.2s;
}

/* Hover nhẹ */
.switch-3-n label:hover {
  color: #022f65;
}

/* Khối trượt */
.switch-3-n a {
  position: absolute;
  top: 4px;
  left: 2px;
  width: calc(var(--label-width) - var(--gap));
  height: calc(var(--toggle-height) - 8px);
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  border-radius: 999px;
  z-index: 2;
  box-shadow: 0 4px 1px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
  transform: translateX(0);
}

/* Label active (radio được chọn) → chữ màu trắng */
.switch-3-n input:checked + label {
  color: #fff;
}
    
/* 2. Giảm khoảng cách trên bảng chính (Bảng Báo cáo thống kê) */

/* Ghi đè margin-top: 20px; mặc định của thẻ table */

@media (max-width: 700px) {

    }
    .special-text-long {
        display: inline;
    }
    .special-text-short {
        display: none;
    }
    @media (max-width: 768px) {
        .special-text-long {
            display: none;
        }
        .special-text-short {
            display: inline;
        }
        .special-filter-label {
            margin-left: 0 !important;
            width: 100%;
            justify-content: center;
            font-size: 12px;
            padding: 5px 8px;
            height: 27px; /* Align with select elements height on mobile */
        }
    }
    
    .card-toggle-btn {
        transition: transform 0.2s ease, color 0.2s ease;
        user-select: none;
    }
    .card-toggle-btn:hover {
        transform: scale(1.2);
    }
    .card-past-container {
        animation: fadeInPast 0.2s ease;
    }
    @keyframes fadeInPast {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
