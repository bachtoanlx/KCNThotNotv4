<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhật ký hệ thống</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  
  <style>
    /* Cố định layout cho bảng */
    #logsTable {
      table-layout: fixed;
      width: 100%;
      word-wrap: break-word; /* Đảm bảo từ dài nhất cũng sẽ được xuống dòng */
      min-width: 800px; /* Đảm bảo bảng không bị co quá nhỏ trên mobile */
    }

    /* Tinh chỉnh layout để lấp đầy màn hình và bỏ cuộn trang */
    @media (min-width: 769px) {
        html, body {
            height: 100vh;
            overflow: hidden;
        }
        
        /* Chặn thư viện SweetAlert2 tự động set height: auto làm hỏng layout */
        html.swal2-height-auto, body.swal2-height-auto {
        height: 100vh;
        overflow: hidden;
        }

        #pageContent {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: 2px;
        padding-left: 10px;
        padding-right: 10px;
        }

        /* Tùy chỉnh container để cuộn dọc nội dung bảng */
        .table-container {
            flex: 1; /* Tự động chiếm không gian còn lại */
            max-height: none; /* Bỏ giới hạn cứng */
            overflow-y: auto; /* Hiện thanh cuộn dọc */
            border: none; /* Bỏ viền ngoài của container để dùng viền bảng */
        }
    }

    /* Thiết lập độ rộng cụ thể cho từng cột và căn chỉnh */
    /* Cột 1: Thời gian */
    #logsTable th:nth-child(1), #logsTable td:nth-child(1) { width: 140px; min-width: 140px; max-width: 140px; } 
    /* Cột 2: Người dùng */
    #logsTable th:nth-child(2), #logsTable td:nth-child(2) { width: 170px; min-width: 170px; max-width: 170px; } 
    /* Cột 3: Hành động */
    #logsTable th:nth-child(3), #logsTable td:nth-child(3) { width: 180px; min-width: 180px; max-width: 180px; } 
    /* Cột 4: Chi tiết (Tự động co giãn phần còn lại) */
    #logsTable th:nth-child(4), #logsTable td:nth-child(4) { width: auto; } 
    
    /* Căn giữa tiêu đề và căn trái nội dung */
    #logsTable th {
      text-align: center;
      background-color: #e8ebf5;
      padding: 8px;
      z-index: 5;
    }
    
    #logsTable td {
      text-align: left;
      padding: 4px 5px; /* Giảm padding */
      font-size: 14px;  /* Giảm cỡ chữ */
      height: 35px;     /* Cố định chiều cao dòng */
    }


    /* Đảm bảo nội dung trong các ô có thể xuống dòng */
    #logsTable td {
      vertical-align: middle; /* Căn giữa theo chiều dọc cho đẹp */
      white-space: nowrap; /* Bắt buộc hiển thị 1 dòng cho TOÀN BỘ các cột */
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    /* CSS cho nội dung chi tiết rút gọn */
    .log-details-wrapper {
        display: block;
        white-space: nowrap; /* Bắt buộc hiển thị 1 dòng */
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
        transition: all 0.2s;
        border-radius: 4px;
    }
    .log-details-wrapper:hover {
        background-color: #f0f8ff;
        color: #0056b3;
    }
    .log-details-wrapper.expanded {
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        background-color: #f0f8ff;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {

      /* --- SỬA LỖI CĂN CHỈNH BỘ LỌC TRÊN MOBILE --- */
      .filter-box {
        width: 100%; /* Đảm bảo container chiếm toàn bộ chiều rộng */
      }
      /* Ẩn các label đứng đơn lẻ không chứa input (Hành động, Người dùng) */
      body .filter-box label:not(:has(input)) {
      display: none;
      }
      /* Cho các thành phần còn lại co giãn lấp đầy */
      body .filter-box > label,
      body .filter-box > button#toggleFilterBtn {
          flex: 1; /* Chia đều không gian */
          min-width: 0; /* Cho phép co lại */
      margin: 0; /* Xóa lề thừa */
      }
      body .filter-box > label {
      gap: 0; /* Triệt tiêu khoảng trống ảo do chữ bị ẩn gây ra */
      }
      /* Ghi đè lại input bên trong để nó chiếm 100% label cha */
  body .filter-box label input[type="date"] {
      width: 100% !important; /* Quan trọng: Ghi đè width: 90px từ styles.css */
          box-sizing: border-box; /* Đảm bảo padding không làm tràn */
      }

      /* --- CƠ CHẾ NEO (STICKY) GIỐNG AUTOPLAN --- */
      
      /* Khóa cuộn toàn bộ trang trên mobile để giữ cố định Navbar (menu) */
      html, body, html.swal2-height-auto, body.swal2-height-auto {
          height: 100vh;
          height: 100dvh;
          overflow: hidden;
      }
      
      /* Bật thanh cuộn độc lập cho phần nội dung */
      body #pageContent:not([style*="none"]) {
          display: flex !important;
          flex-direction: column;
          overflow-y: auto;
          overflow-x: hidden;
          flex: 1 1 auto;
          min-height: 0;
          -webkit-overflow-scrolling: touch;
          padding: 0 8px; /* Đồng bộ padding ngang */
      }

      /* Khắc phục lỗi overflow của các thẻ bọc ngăn cản sticky và cuộn trang */
      body .card-body, body .card {
          display: block;
          overflow: visible;
          padding-top: 0; /* Loại bỏ padding-top mặc định để không bị trượt khoảng hở ban đầu */
      }
      
      /* Đảm bảo bảng có thể cuộn ngang độc lập */
      body .table-container {
          display: block;
          overflow-x: auto;
          overflow-y: visible;
          -webkit-overflow-scrolling: touch;
      }

      /* 1. Cố định Tiêu đề "Nhật ký hệ thống" trên cùng */
      #pageContent > h2 {
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      z-index: 62;
      background-color: var(--bg-color); /* Phông nền che nội dung cuộn */
      padding: 10px 5px; /* Căn giữa nội dung trong khung */
      margin: 0 -8px; /* Bù lại padding của #pageContent */
      width: calc(100% + 16px);
      height: 40px; /* Cố định chiều cao tuyệt đối để phần tử dưới neo chuẩn xác */
      line-height: 20px;
      font-size: 1.1rem;
      box-sizing: border-box;
          -webkit-transform: translate3d(0,0,0); /* Chống rung (Jitter) khi cuộn trên iOS */
          transform: translate3d(0,0,0);
      }

      /* 2. Cố định KHỐI bọc Tìm kiếm & Bộ lọc ngay bên dưới */
  body .sticky-search-filter {
      position: -webkit-sticky; /* Bắt buộc cho Safari */
      position: sticky;
      top: 40px; /* Khớp chính xác với chiều cao 40px của thẻ h2 */
      z-index: 61;
      background-color: var(--bg-color);
      margin-left: -8px; /* Ép mở rộng kịch khung 2 bên mép */
      margin-right: -8px;
      margin-top: 0;
      padding: 4px 8px 3px 8px; 
      margin-bottom: 5px;
      width: calc(100% + 16px);
      box-sizing: border-box;
      box-shadow: 0 4px 6px -4px rgba(0,0,0,0.08);
          -webkit-transform: translate3d(0,0,0); /* Bật tăng tốc phần cứng để chống rung */
          transform: translate3d(0,0,0);
      }
    }
    
    /* Animation highlight */
    @keyframes highlightOutline {
        0% { outline: 2px solid transparent; box-shadow: none; }
        25% { outline: 3px solid #ff4444; box-shadow: 0 0 20px rgba(255, 68, 68, 0.8); }
        50% { outline: 2px solid transparent; box-shadow: none; }
        75% { outline: 3px solid #ff4444; box-shadow: 0 0 20px rgba(255, 68, 68, 0.8); }
        100% { outline: 2px solid transparent; box-shadow: none; }
    }
    .highlight-area {
        animation: highlightOutline 2s ease-in-out;
        border-radius: 4px;
        outline-offset: 6px;
    }

    /* --- TỐI ƯU HÓA KHÔNG GIAN (COMPACT MODE) --- */
    body nav.navbar {
        margin-bottom: 5px;
    }

    body h2 {
        margin: 2px 0 5px 0;
        font-size: 1.3rem;
    }
    

    /* --------------------------------------------- */
  </style>
  </head>
<body>
  <div id="menu-placeholder"></div>
  
  <div id="notLogged" style="display:none;">
    <a href="trangchu.html">❌ Bạn cần đăng nhập để truy cập trang này.</a>
  </div>

  <div id="noPermission" style="display:none;">
    🚫 Bạn không có quyền truy cập trang này.
  </div>

  <div id="pageContent" style="display:none;">
    <h2>📜 Nhật ký hệ thống</h2>
    <div class="card-body"> 

      <!-- KHỐI BỌC STICKY TRÊN MOBILE -->
      <div class="sticky-search-filter">
        <div class="filter-box">
          <label>Từ ngày: <input type="date" id="startDateInput"></label>
          <label>Đến ngày: <input type="date" id="endDateInput"></label>
          <label style="white-space:nowrap;">Hành động:</label>
          <select id="actionFilter"><option value="">--Tất cả--</option></select>
          <label style="white-space:nowrap;">Người dùng:</label>
          <select id="userFilter"><option value="">--Tất cả--</option></select>
          <button id="toggleFilterBtn" type="button">Áp dụng</button>
        </div>
          
        <div style="margin-bottom: 4px;">
          <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm nhật ký..." style="width: 100%; padding: 8px;">
        </div>
      </div>
      <div class="table-container">
        <table id="logsTable">
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Người dùng</th>
              <th>Hành động</th>
              <th>Chi tiết</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div style="text-align: center; margin-top: 15px; padding-bottom: 20px;">
            <button id="loadMoreBtn" class="btn-action btn-primary" style="display: none; padding: 8px 20px;">⬇️ Cuộn để tải thêm...</button>
        </div>
      </div>
  </div>
</div>

<div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script type="module" src="logs.js"></script> 

  </script>
</body>
</html>
