<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng dữ liệu</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    /* CSS CỐ ĐỊNH CHIỀU RỘNG CHO CỘT STT */
    #dataTable th:first-child,
    #dataTable td:first-child {
        width: 50px;
        min-width: 50px;
        max-width: 50px; 
    }
    
    /* --- TÙY CHỈNH KÍCH THƯỚC CÁC CỘT (Thêm vào để chỉnh từng cột) --- */
    /* Cột 2: Người gửi (Admin only) */
    #dataTable th:nth-child(2), #dataTable td:nth-child(2) { width: 170px; min-width: 170px; max-width: 170px; }

    /* Cột 3: Công ty */
    #dataTable th:nth-child(3), #dataTable td:nth-child(3) { width: 140px; min-width: 140px; max-width: 140px; }
    
    /* Cột 4: Ngày nghỉ */
    #dataTable th:nth-child(4), #dataTable td:nth-child(4) { width: 100px; min-width: 100px; max-width: 100px; }
    
    /* Cột 5: Ghi chú */
    #dataTable th:nth-child(5), #dataTable td:nth-child(5) { width: auto; max-width: 300px; }

    /* Cột 6: File */
    #dataTable th:nth-child(6), #dataTable td:nth-child(6) { width: 60px; max-width: 60px; }

    /* Cột 7: Thời gian (Admin only) */
    #dataTable th:nth-child(7), #dataTable td:nth-child(7) { width: 140px; min-width: 140px; max-width: 140px; }

    /* Cột 8: Hành động (Admin only) */
    #dataTable th:nth-child(8), #dataTable td:nth-child(8) { width: 70px; min-width: 70px; max-width: 70px; }
    /* ---------------------------------------------------------------- */
    
    #dataTable th,
    #dataTable td {
        text-align: center;
        vertical-align: middle;
        padding: 4px 5px; /* Giảm padding */
        font-size: 14px;  /* Giảm cỡ chữ */
        height: 35px;     /* Cố định chiều cao */
        /* Force single line */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 200px;
    }
    
    /* Tối ưu nút xóa cho compact mode */
    .delBtn {
        padding: 2px 8px !important;
        font-size: 12px !important;
        height: 24px !important;
        line-height: 1 !important;
        min-height: 0 !important;
    }
    
    .clickable-cell {
        cursor: pointer;
        color: #0056b3;
    }
    .clickable-cell:hover {
        text-decoration: underline;
        background-color: #f0f8ff;
    }
    .clickable-cell.expanded {
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        background-color: #f0f8ff;
    }

    .admin-only {
        display: none;
    }

    .admin-visible {
        display: table-cell !important;
    }
    /* CSS MỚI CHO CÁC CONTROLS DƯỚI BỘ LỌC CHÍNH */
    .controls-row {
        display: flex;
        justify-content: space-between; /* Đẩy các nhóm điều khiển ra hai phía */
        align-items: center; /* Căn chỉnh theo chiều dọc */
        margin-top: 5px;
        margin-bottom: 2px;
    }

    .left-controls {
        display: flex;
        align-items: center;
        gap: 15px; /* Khoảng cách giữa checkbox và ghi chú lọc */
    }

    .right-controls {
        display: flex;
        align-items: center;
    }
    
    /* RESPONSIVE MOBILE */
    @media (max-width: 768px) {
      .table-reports-2 {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }
      
      .table-reports-2 table {
        min-width: 410px !important;
      }
      
      .table-reports-2 #dataTable th,
      .table-reports-2 #dataTable td {
        padding: 4px 2px !important;
        font-size: 11px !important;
      }
      
      /* STT */
      .table-reports-2 #dataTable th:nth-child(1),
      .table-reports-2 #dataTable td:nth-child(1) {
        width: 30px !important;
        min-width: 30px !important;
        max-width: 30px !important;
      }
      
      /* Công ty (cột 3 vì cột 2 là admin-only) */
      .table-reports-2 #dataTable th:nth-child(3),
      .table-reports-2 #dataTable td:nth-child(3) {
        width: 110px !important;
        min-width: 110px !important;
        max-width: 110px !important;
        white-space: normal !important;
        word-wrap: break-word !important;
      }
      
      /* Ngày nghỉ (cột 4) */
      .table-reports-2 #dataTable th:nth-child(4),
      .table-reports-2 #dataTable td:nth-child(4) {
        width: 75px !important;
        min-width: 75px !important;
        max-width: 75px !important;
      }
      
      /* Ghi chú (cột 5) */
      .table-reports-2 #dataTable th:nth-child(5),
      .table-reports-2 #dataTable td:nth-child(5) {
        width: 155px !important;
        min-width: 155px !important;
        max-width: 155px !important;
        white-space: normal !important;
        word-wrap: break-word !important;
      }
      
      /* File/Link (cột 6) */
      .table-reports-2 #dataTable th:nth-child(6),
      .table-reports-2 #dataTable td:nth-child(6) {
        width: 40px !important;
        min-width: 40px !important;
        max-width: 40px !important;
        font-size: 10px !important;
        padding: 2px 1px !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
      }
      
      /* Thời gian (cột 7 - admin-only) */
      .table-reports-2 #dataTable th:nth-child(7),
      .table-reports-2 #dataTable td:nth-child(7) {
        width: 110px !important;
        min-width: 110px !important;
        max-width: 110px !important;
        font-size: 10px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
      }
      
      /* Hành động (cột 8 - admin-only) */
      .table-reports-2 #dataTable th:nth-child(8),
      .table-reports-2 #dataTable td:nth-child(8) {
        width: 65px !important;
        min-width: 65px !important;
        max-width: 65px !important;
        padding: 2px !important;
        overflow: hidden !important;
      }
      
      /* Nút Xóa trong cột Hành động */
      .table-reports-2 #dataTable td:nth-child(8) button {
        font-size: 11px !important;
        padding: 4px 6px !important;
        width: 100% !important;
        max-width: 51px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: clip !important;
      }
      
      .controls-row {
        flex-direction: column;
        gap: 10px;
        align-items: stretch;
      }
      
      .left-controls,
      .right-controls {
        width: 100%;
        justify-content: space-between;
      }
    }
    
    /* Animation highlight */
    @keyframes highlightOutline {
        0% { outline: 2px solid transparent; box-shadow: none; }
        25% { outline: 3px solid #ff4444; box-shadow: 0 0 20px rgba(255, 68, 68, 0.8); }
        50% { outline: 2px solid transparent; box-shadow: none; }
        75% { outline: 3px solid #ff4444; box-shadow: 0 0 20px rgba(255, 68, 68, 0.8); }
        100% { outline: 2px solid transparent; box-shadow: none; }
    }
    .highlight-area {
        animation: highlightOutline 2s ease-in-out;
        border-radius: 4px;
        outline-offset: 6px;
    }

    /* Giảm khoảng cách dưới menu */
    nav.navbar {
        margin-bottom: 5px !important;
    }
    
    /* --- TỐI ƯU HÓA KHÔNG GIAN (COMPACT MODE) --- */
    h2 {
        margin: 2px 0 5px 0 !important;
        font-size: 1.3rem !important;
    }
    
    .filter-box {
        margin: 0 0 5px 0 !important;
        gap: 5px !important;
    }
    
    .filter-box input, .filter-box select, .filter-box button {
        height: 28px !important;
        padding: 2px 8px !important;
        font-size: 13px !important;
    }
    
    .search-container {
        margin-bottom: 5px !important;
    }
    /* --------------------------------------------- */

    /* Tinh chỉnh layout để lấp đầy màn hình và bỏ cuộn trang */
    html, body {
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    #pageContent {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
    }

    .card-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding-bottom: 2px;
        padding-left: 10px !important;
        padding-right: 10px !important;
    }

    form {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    /* Tùy chỉnh container để cuộn dọc nội dung bảng */
    .table-container {
        flex: 1; /* Tự động chiếm không gian còn lại */
        max-height: none; /* Bỏ giới hạn cứng */
        overflow: auto; /* Hiện thanh cuộn (cả dọc và ngang nếu cần) */
        border: 1px solid #ddd;
    }
    
    /* Cố định tiêu đề bảng */
    #dataTable th {
        position: sticky;
        top: 0;
        z-index: 5;
        box-shadow: 0 1px 0 #ccc;
    }
        
  </style>
</head>
<body>
  <div id="menu-placeholder"></div>
  <div id="loading-placeholder"></div>
  <div id="alert-placeholder"></div>

  <div id="notLogged" style="display:none;">
    ❌ Bạn cần đăng nhập để truy cập trang này.
  </div>

  <div id="pageContent" style="display:none;">
    <h2>📊 Bảng dữ liệu báo cáo ngày nghỉ </h2>
    <div class="card-body">

    <div class="filter-box">
      <label>Từ ngày: <input type="date" id="fromDate"></label>
      <label>Đến ngày: <input type="date" id="toDate"></label>
      <label>Năm nhanh:
        <select id="yearSelect">
          <option value="">--Chọn năm--</option>
        </select>
      </label>
      <button id="applyFilter" type="button">Áp dụng</button>
    </div>
      <form>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm...">
    </div>
        <div class="table-container table-reports-2">
        <table id="dataTable">
          <thead>
            <tr>
              <th>STT</th>
              <th class="admin-only">Người gửi</th>
              <th>Công ty</th>
              <th>Ngày nghỉ</th>
              <th>Ghi chú</th>
              <th>File</th>
              <th class="admin-only">Thời gian</th>
              <th class="admin-only">Hành động</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        </div>
      </form>
      
      <div class="controls-row">
        <div class="left-controls">
          <label><input type="checkbox" id="specialWorkdayFilter"> Chỉ xem Ngày làm đặc biệt</label>
        </div>
        <div class="right-controls">
          <label for="displayCount">Hiển thị:</label>
          <select id="displayCount">
              <option value="10">10 dòng</option>
              <option value="20">20 dòng</option>
              <option value="50">50 dòng</option>
              <option value="all">Toàn bộ</option>
          </select>
        </div>
      </div>
    </div>
  </div>
<div id="footer-placeholder" style="display:none;"></div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script type="module">
    // === 1. IMPORT ===
    import { auth, onAuth, deleteReport, getRole, showLoading, hideLoading, showSwal, showConfirmSwal, 
             getReportsByDate, db } from "./script.js";
    import { collection, query, where, orderBy, getDocs, limit, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { initMenu } from "./menu.js";

    // === 2. TẢI GIAO DIỆN CHUNG ===
    fetch("menu.html").then(r => r.text()).then(h => {
      document.getElementById("menu-placeholder").innerHTML = h;
      initMenu();
    });
    fetch("modal.html").then(r => r.text()).then(h => {
      document.getElementById("loading-placeholder").innerHTML = h;
    });
    
    // (Footer sẽ được tải bên trong onAuth)

    // === 3. THAM CHIẾU DOM VÀ BIẾN TOÀN CỤC ===
    const notLogged = document.getElementById("notLogged");
    const content   = document.getElementById("pageContent");
    const footer = document.getElementById("footer-placeholder");
    const tbody     = document.querySelector("#dataTable tbody");
    const searchInput = document.getElementById("searchInput");
    const displayCountSelect = document.getElementById("displayCount");
    const fromInput = document.getElementById("fromDate");
    const toInput = document.getElementById("toDate");
    const yearSelect = document.getElementById("yearSelect");
    const applyFilterBtn = document.getElementById("applyFilter");
    const specialWorkdayFilterInput = document.getElementById("specialWorkdayFilter"); 
    
    let currentFilter = { from: null, to: null };
    let initialLoad = true;
    let allSearchData = [];
    let userRole = null;
    let realtimeListener = null; // ⭐️ Listener để cleanup
    let highlightTimeout = null; // Biến debounce cho highlight

    // === 4. CÁC HÀM TIỆN ÍCH ===
    function formatISODate(d) {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }
    function getRecordDate(record) {
        return record.ngay_nghi || record.ngay_lam_db;
    }
    const formatTimestamp = (timestamp) => {
        if (!timestamp) return "";
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return date.toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).replace(/\//g, '/');
    };
    
    // === 5. CÁC HÀM RENDER VÀ SỰ KIỆN ===
    const attachDeleteEventListeners = () => {
      document.querySelectorAll(".delBtn").forEach(btn => {
          btn.addEventListener("click", async () => {
              const id = btn.dataset.id;
              const isConfirmed = await showConfirmSwal(
                  "Xác nhận xóa báo cáo",
                  "Bạn có chắc muốn **Xóa vĩnh viễn** không? Hành động này không thể hoàn tác.",
                  "Có, xóa báo cáo", "Không, hủy bỏ", "error"
              );
              if (isConfirmed) {
                  showLoading("Đang xóa dữ liệu...");
                  try {
                      await deleteReport("reports_2", id); 
                      showSwal("success", "Đã xóa báo cáo!");
                      await fetchAndRenderData(); // Tải lại data sau khi xóa
                  } catch (err) {
                      console.error("Lỗi khi xóa báo cáo:", err);
                      showSwal("error", "Lỗi khi xóa", "Không thể xóa báo cáo. Vui lòng thử lại.");
                  } finally {
                      hideLoading();
                  }
              }
          });
      });
    };

    const filterAndRenderData = (data, query, limit) => {
        const isSpecialWorkdayFilterActive = specialWorkdayFilterInput ? specialWorkdayFilterInput.checked : false;
        let fromDate = null;
        let toDate = null;
        const now = new Date();
        const currentYearStart = formatISODate(new Date(now.getFullYear(), 0, 1)); 
        if (currentFilter.from) fromDate = new Date(currentFilter.from); 
        else fromDate = new Date(currentYearStart); 
        if (currentFilter.to) toDate = new Date(currentFilter.to);
        else toDate = now; 
        toDate.setHours(23,59,59,999);
        
        // Lọc theo checkbox
        let filteredByDate = data.filter(r => {
            const dateString = getRecordDate(r); 
            if (!dateString) return false; 
            const d = new Date(dateString);
            if (isNaN(d)) return false; 
            
            if (isSpecialWorkdayFilterActive && !r.isSpecialWorkday) {
                return false;
            }
            // (Lọc theo ngày đã được Firebase xử lý, không cần lọc lại)
            return true;
        });
        
        // Lọc theo tìm kiếm
        const lowerCaseQuery = query.toLowerCase().trim();
        const isAdmin = userRole === "admin";
        const filteredData = filteredByDate.filter(item => { 
            const searchString = [
                item.createdBy, item.company, item.ghi_chu, getRecordDate(item)
            ].map(field => field ? field.toString().toLowerCase() : "").join(" ");
            return searchString.includes(lowerCaseQuery);
        });
        
        // Sắp xếp
        filteredData.sort((a, b) => {
            const dateA = new Date(getRecordDate(a) || 0);
            const dateB = new Date(getRecordDate(b) || 0);
            return dateB - dateA; // Mới nhất lên đầu
        });
        
        // ⭐️ BỎ LOGIC slice VÌ ĐÃ LIMIT Ở FIREBASE
        let finalData = filteredData;

        // Render
        tbody.innerHTML = ""; // ⭐️ Xóa nội dung cũ trước khi render

        // Xóa timeout cũ nếu có (debounce)
        if (highlightTimeout) {
            clearTimeout(highlightTimeout);
            highlightTimeout = null;
        }
        // Xóa class highlight cũ nếu đang chạy dở
        document.querySelectorAll('.highlight-area').forEach(el => el.classList.remove('highlight-area'));
        
        if (finalData.length === 0) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td colspan="8" style="text-align: center; color: #cc0000; font-style: italic; padding: 20px;">
                Dữ liệu đang tìm không có hoặc nằm ngoài vùng hiển thị, hãy điều chỉnh để có kết quả tìm chính xác hơn.
            </td>`;
            tbody.appendChild(tr);
            
            // Hiệu ứng nhắc nhở người dùng
            highlightTimeout = setTimeout(() => {
                const filterBox = document.querySelector('.filter-box');
                if (filterBox) {
                    filterBox.classList.add('highlight-area');
                    setTimeout(() => {
                        filterBox.classList.remove('highlight-area');
                        const displayCountEl = document.getElementById('displayCount');
                        const displayContainer = displayCountEl ? (displayCountEl.closest('.right-controls') || displayCountEl.parentElement) : null;
                        if (displayContainer) {
                            displayContainer.classList.add('highlight-area');
                            setTimeout(() => displayContainer.classList.remove('highlight-area'), 2000);
                        }
                    }, 2000);
                }
            }, 1500); // Đợi 1.5s sau khi dừng gõ mới nháy
            return;
        }

        let html = "";
        let sttCounter = 1; 
        finalData.forEach(r => {
            const fileLink = r.fileUrl ? `<a href="${r.fileUrl}" target="_blank">Link</a>` : "";
            const formattedTime = formatTimestamp(r.updatedAt || r.createdAt);
            let combinedGhiChu = r.ghi_chu || "";
            let displayGhiChu = combinedGhiChu;
            
            if (r.ngay_lam_db) {
                combinedGhiChu += `<br><b>(Ngày làm ĐB: ${r.ngay_lam_db})</b>`; 
                displayGhiChu += ` (Ngày làm ĐB: ${r.ngay_lam_db})`;
            }
            
            // Xử lý loại bỏ thẻ <br> để hiển thị 1 dòng trên bảng
            displayGhiChu = displayGhiChu.replace(/<br\s*\/?>/gi, " | ");

            const displayDate = r.ngay_nghi || ""; 

            const tr = document.createElement('tr');
            tr.innerHTML = `
                    <td>${sttCounter++}</td> 
                    <td class="admin-only">${r.createdBy || ""}</td>
                    <td>${r.company || ""}</td>
                    <td>${displayDate}</td> 
                    <td><div class="clickable-cell" title="Nhấn xem chi tiết">${displayGhiChu}</div></td> 
                    <td>${fileLink}</td>
                    <td class="admin-only">${formattedTime}</td>
                    <td class="admin-only"><button type="button" data-id="${r.id}" class="delBtn">Xóa</button></td>`;
            
            const noteCell = tr.querySelector('.clickable-cell');
            if (noteCell) {
                noteCell._fullContent = combinedGhiChu || "Không có ghi chú";
                noteCell._previewContent = displayGhiChu;

                noteCell.addEventListener('click', function(e) {
                    const currentDiv = e.currentTarget;
                    const isExpanded = currentDiv.classList.contains('expanded');

                    // 1. Thu gọn tất cả các dòng khác đang mở
                    document.querySelectorAll('.clickable-cell.expanded').forEach(div => {
                        if (div !== currentDiv) {
                            div.classList.remove('expanded');
                            div.innerHTML = div._previewContent;
                            div.title = "Nhấn xem chi tiết";
                        }
                    });

                    // 2. Toggle dòng hiện tại
                    if (isExpanded) {
                        currentDiv.classList.remove('expanded');
                        currentDiv.innerHTML = currentDiv._previewContent;
                        currentDiv.title = "Nhấn xem chi tiết";
                    } else {
                        currentDiv.classList.add('expanded');
                        currentDiv.innerHTML = currentDiv._fullContent;
                        currentDiv.title = "Nhấn để thu gọn";
                    }
                });
            }
            
            tbody.appendChild(tr);
        });
        // tbody.innerHTML = html;
        attachDeleteEventListeners();
        document.querySelectorAll("#dataTable th.admin-only, #dataTable td.admin-only").forEach(el => {
            el.style.display = isAdmin ? "table-cell" : "none";
        });
    };

    // === 6. HÀM TẢI DỮ LIỆU MỚI ===
    async function fetchAndRenderData() {
        // ⭐️ 0. HỦY LISTENER CŨ (nếu có)
        if (realtimeListener) {
            realtimeListener();
            realtimeListener = null;
        }

        // Tự động điền ngày mặc định nếu trống và không chọn năm
        if (!yearSelect.value) {
            if (!fromInput.value) {
                const currentYear = new Date().getFullYear();
                fromInput.value = `${currentYear}-01-01`;
            }
            if (!toInput.value) {
                const now = new Date();
                toInput.value = formatISODate(now);
            }
        }

        // 1. Lấy ngày
        const fromVal = fromInput.value;
        const toVal = toInput.value;
        const yearVal = yearSelect.value;
        
        let startDate, endDate;
        const todayISO = formatISODate(new Date());
        const currentYearStart = new Date().getFullYear() + '-01-01';

        if (yearVal) {
            startDate = `${yearVal}-01-01`;
            const currentYear = new Date().getFullYear();
            if (parseInt(yearVal) === currentYear) {
                endDate = todayISO;
            } else {
                endDate = `${yearVal}-12-31`;
            }
            currentFilter.from = startDate;
            currentFilter.to = endDate;
            // Cập nhật UI
            fromInput.value = startDate;
            toInput.value = endDate;
        } else if (fromVal && toVal) {
            startDate = fromVal;
            endDate = toVal;
            currentFilter.from = startDate;
            currentFilter.to = endDate;
        } else if (toVal) {
            startDate = currentYearStart;
            endDate = toVal;
            currentFilter.from = startDate;
            currentFilter.to = endDate;
        } else if (fromVal) {
            startDate = fromVal;
            endDate = todayISO;
            currentFilter.from = startDate;
            currentFilter.to = endDate;
        } else {
            startDate = currentFilter.from || currentYearStart;
            endDate = currentFilter.to || todayISO;
            // Cập nhật lại filter toàn cục
            currentFilter.from = startDate;
            currentFilter.to = endDate;
        }
        
        // 2. Bật loading
        showLoading("Đang tải dữ liệu...");
        try {
            // ⭐️ 3. Chạy 2 truy vấn VỚI LIMIT
            const selectedLimit = displayCountSelect.value; // "7", "20", hoặc "all"
            
            let q1 = query(
                collection(db, "reports_2"),
                where("ngay_nghi", ">=", startDate),
                where("ngay_nghi", "<=", endDate),
                orderBy("ngay_nghi", "desc")
            );
            let q2 = query(
                collection(db, "reports_2"),
                where("ngay_lam_db", ">=", startDate),
                where("ngay_lam_db", "<=", endDate),
                orderBy("ngay_lam_db", "desc")
            );
            
            // Thêm limit nếu không phải "all"
            if (selectedLimit && selectedLimit !== "all") {
                const limitNum = parseInt(selectedLimit);
                q1 = query(q1, limit(limitNum));
                q2 = query(q2, limit(limitNum));
            }

            const [snap1, snap2] = await Promise.all([getDocs(q1), getDocs(q2)]);
            
            const reportsMap = new Map();
            snap1.docs.forEach(doc => reportsMap.set(doc.id, { id: doc.id, ...doc.data() }));
            snap2.docs.forEach(doc => reportsMap.set(doc.id, { id: doc.id, ...doc.data() }));

            allSearchData = Array.from(reportsMap.values());
            
            // ⭐️ 4. BẬT REAL-TIME LISTENER (Lắng nghe cả 2 trường ngày)
            // Tạo lại queries với listener
            let q1Listener = query(
                collection(db, "reports_2"),
                where("ngay_nghi", ">=", startDate),
                where("ngay_nghi", "<=", endDate),
                orderBy("ngay_nghi", "desc")
            );
            let q2Listener = query(
                collection(db, "reports_2"),
                where("ngay_lam_db", ">=", startDate),
                where("ngay_lam_db", "<=", endDate),
                orderBy("ngay_lam_db", "desc")
            );
            
            if (selectedLimit && selectedLimit !== "all") {
                const limitNum = parseInt(selectedLimit);
                q1Listener = query(q1Listener, limit(limitNum));
                q2Listener = query(q2Listener, limit(limitNum));
            }
            
            // Dùng onSnapshot để tự động cập nhật
            let snap1Data = [];
            let snap2Data = [];
            
            const unsubscribe1 = onSnapshot(q1Listener, (snapshot) => {
                snap1Data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateCombinedData();
            });
            
            const unsubscribe2 = onSnapshot(q2Listener, (snapshot) => {
                snap2Data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateCombinedData();
            });
            
            // Cleanup function
            realtimeListener = () => {
                unsubscribe1();
                unsubscribe2();
            };
            
            function updateCombinedData() {
                const combinedMap = new Map();
                snap1Data.forEach(item => combinedMap.set(item.id, item));
                snap2Data.forEach(item => combinedMap.set(item.id, item));
                allSearchData = Array.from(combinedMap.values());
                filterAndRenderData(allSearchData, searchInput.value, "all");
            }
            
        } catch (err) {
             console.error("Lỗi khi tải reports_2:", err);
             showSwal("error", "Lỗi tải dữ liệu", err.message);
             allSearchData = [];
        }
        
        // 5. KHÔNG render ở đây nữa vì onSnapshot sẽ trigger
        // filterAndRenderData(allSearchData, searchInput.value, "all");
    }
    
    // === 7. BỘ XỬ LÝ SỰ KIỆN LỌC ===
    function resetYearSelectIfEditingDates() {
      if (yearSelect && yearSelect.value !== "") yearSelect.value = "";
    }
    [fromInput, toInput].forEach(el => {
      if (!el) return;
      el.addEventListener("focus", resetYearSelectIfEditingDates);
      el.addEventListener("input", resetYearSelectIfEditingDates);
      el.addEventListener("change", resetYearSelectIfEditingDates);
    });

    if(applyFilterBtn) {
        applyFilterBtn.addEventListener("click", async (e) => {
            e.preventDefault();
            await fetchAndRenderData(); // Tải data
            hideLoading(); // Tắt loading SAU KHI data tải xong
        });
    }

    if(yearSelect) {
        yearSelect.addEventListener("change", async (e) => {
            await fetchAndRenderData(); // Tải data
            hideLoading(); // Tắt loading SAU KHI data tải xong
        });
    }

    if (specialWorkdayFilterInput) {
        specialWorkdayFilterInput.addEventListener("change", () => {
            // Chỉ render lại, không tải lại
            filterAndRenderData(allSearchData, searchInput.value, displayCountSelect.value);
        });
    }

    // === 8. HÀM ON AUTH (ĐÃ SỬA LỖI FOOTER VÀ TẢI NĂM) ===
    onAuth(async (user) => {
        if (user) {
            notLogged.style.display = "none";
            
            // Tải footer nhưng chưa hiển thị
            fetch("footer.html").then(r => r.text()).then(h => {
                if (footer) footer.innerHTML = h;
            });
            
            showLoading("Đang tải cấu hình..."); 
            
            try {
                // 1. Cài đặt UI Admin
                userRole = await getRole(user.email);
                const isAdmin = userRole === "admin";
                document.querySelectorAll("#dataTable th.admin-only").forEach(th => {
                    th.style.display = isAdmin ? "table-cell" : "none";
                });
                const formElement = document.querySelector('#pageContent form'); 
                if (formElement) {
                    formElement.addEventListener('submit', (e) => e.preventDefault());
                }

                // --- 2. TẢI DANH SÁCH NĂM TỰ ĐỘNG (CÁCH ĐƠN GIẢN HƠN) ---
                let years = [];
                try {
                    // Lấy TẤT CẢ documents (không orderBy để tránh lỗi index)
                    const allDocsSnap = await getDocs(collection(db, "reports_2"));
                    
                    const yearsSet = new Set();
                    allDocsSnap.docs.forEach(doc => {
                        const data = doc.data();
                        // Lấy năm từ ngay_nghi
                        if (data.ngay_nghi) {
                            try {
                                const year = new Date(data.ngay_nghi).getFullYear();
                                if (!isNaN(year) && year > 2000 && year < 2100) {
                                    yearsSet.add(year);
                                }
                            } catch (e) {
                                console.warn('Invalid ngay_nghi:', data.ngay_nghi);
                            }
                        }
                        // Lấy năm từ ngay_lam_db
                        if (data.ngay_lam_db) {
                            try {
                                const year = new Date(data.ngay_lam_db).getFullYear();
                                if (!isNaN(year) && year > 2000 && year < 2100) {
                                    yearsSet.add(year);
                                }
                            } catch (e) {
                                console.warn('Invalid ngay_lam_db:', data.ngay_lam_db);
                            }
                        }
                    });
                    
                    // Chuyển Set thành Array và sắp xếp giảm dần
                    years = Array.from(yearsSet).sort((a, b) => b - a).map(y => y.toString());
                    
                    // Nếu không có năm nào, dùng năm hiện tại
                    if (years.length === 0) {
                        years = [new Date().getFullYear().toString()];
                    }
                } catch (error) {
                    console.error('Lỗi tải danh sách năm:', error);
                    // Fallback: Dùng 3 năm gần đây
                    const currentYear = new Date().getFullYear();
                    years = [currentYear, currentYear - 1, currentYear - 2].map(y => y.toString());
                }
                
                const ys = document.getElementById("yearSelect");
                if(ys) {
                    ys.innerHTML = `<option value="">--Chọn năm--</option>`;
                    years.forEach(y => {
                        ys.innerHTML += `<option value="${y}">${y}</option>`;
                    });
                }
                // --- KẾT THÚC TẢI NĂM ---

                // 3. Thiết lập bộ lọc mặc định
                if(initialLoad) {
                    const currentYear = new Date().getFullYear().toString();
                    if (years.includes(currentYear) && ys) {
                      const todayISO = formatISODate(new Date());
                      const currentYearStart = currentYear + '-01-01';
                      fromInput.value = currentYearStart;
                      toInput.value = todayISO;
                      currentFilter.from = currentYearStart;
                      currentFilter.to = todayISO; 
                      ys.value = currentYear;
                    } else if (years.length > 0) {
                        fromInput.value = `${years[0]}-01-01`;
                        toInput.value = `${years[0]}-12-31`;
                        currentFilter.from = `${years[0]}-01-01`;
                        currentFilter.to = `${years[0]}-12-31`;
                        ys.value = years[0];
                    }
                    initialLoad = false;
                }

                // Tự động chọn 10 dòng trên mobile
                if (window.innerWidth <= 768 && displayCountSelect) {
                    displayCountSelect.value = "10";
                }

                // 4. Tải dữ liệu chính (Lần đầu)
                // (Hàm này sẽ bật loading, nhưng không tắt nó)
                await fetchAndRenderData(); 
                
                // 5. HIỂN THỊ NỘI DUNG VÀ FOOTER
                content.style.display = "flex"; 
                if (footer) footer.style.display = "block";

            } catch (err) {
                 showSwal("error", "Lỗi tải dữ liệu", err.message);
                 console.error("Lỗi onAuth:", err); 
                 if (footer) footer.style.display = "none";
            } finally {
                // 6. Luôn tắt loading TỔNG ở cuối cùng
                hideLoading(); 
            }
            
            // 7. Gắn listener
            searchInput.addEventListener("input", () => {
                filterAndRenderData(allSearchData, searchInput.value, displayCountSelect.value);
            });
            displayCountSelect.addEventListener("change", () => {
                // ⭐️ KHI THAY ĐỔI LIMIT → TẢI LẠI DATA TỪ FIREBASE
                fetchAndRenderData();
            });

        } else {
            notLogged.style.display = "block";
            content.style.display = "none";
            if (footer) footer.style.display = "none"; 
            hideLoading(); 
        }
    });
  </script>
