<!DOCTYPE html>
<html lang="vi">
<head>
  <!-- PWA & Mobile Fullscreen -->
  <link rel='manifest' href='manifest.json'>
  <meta name='theme-color' content='#273668'>
  <meta name='apple-mobile-web-app-capable' content='yes'>
  <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>
  <meta name='apple-mobile-web-app-title' content='QL KCN'>
  <link rel='apple-touch-icon' href='https://cdn-icons-png.flaticon.com/512/6846/6846274.png'>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng dữ liệu</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    /* CSS CỐ ĐỊNH CHIỀU RỘNG CHO CỘT STT */
    #dataTable th:first-child,
    #dataTable td:first-child {
        width: 50px;
        min-width: 50px;
        max-width: 50px; 
    }
    
    /* --- TÙY CHỈNH KÍCH THƯỚC CÁC CỘT (Thêm vào để chỉnh từng cột) --- */
    /* Cột 2: Người gửi (Admin only) */
    #dataTable th:nth-child(2), #dataTable td:nth-child(2) { width: 170px; min-width: 170px; max-width: 170px; }

    /* Cột 3: Công ty */
    #dataTable th:nth-child(3), #dataTable td:nth-child(3) { width: 140px; min-width: 140px; max-width: 140px; }
    
    /* Cột 4: Ngày nghỉ */
    #dataTable th:nth-child(4), #dataTable td:nth-child(4) { width: 100px; min-width: 100px; max-width: 100px; }
    
    /* Cột 5: Ghi chú */
    #dataTable th:nth-child(5), #dataTable td:nth-child(5) { width: auto; max-width: 300px; }

    /* Cột 6: File */
    #dataTable th:nth-child(6), #dataTable td:nth-child(6) { width: 60px; max-width: 60px; }

    /* Cột 7: Thời gian (Admin only) */
    #dataTable th:nth-child(7), #dataTable td:nth-child(7) { width: 140px; min-width: 140px; max-width: 140px; }

    /* Cột 8: Hành động (Admin only) */
    #dataTable th:nth-child(8), #dataTable td:nth-child(8) { width: 70px; min-width: 70px; max-width: 70px; }
    /* ---------------------------------------------------------------- */
    
    #dataTable th,
    #dataTable td {
        text-align: center;
        vertical-align: middle;
        padding: 4px 5px; /* Giảm padding */
        font-size: 14px;  /* Giảm cỡ chữ */
        height: 35px;     /* Cố định chiều cao */
        /* Force single line */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 200px;
    }
    
    /* Tối ưu nút xóa cho compact mode */
    body .delBtn {
        padding: 2px 8px;
        font-size: 12px;
        height: 24px;
        line-height: 1;
        min-height: 0;
    }
    
    .clickable-cell {
        cursor: pointer;
        color: #0056b3;
    }
    .clickable-cell:hover {
        text-decoration: underline;
        background-color: #f0f8ff;
    }
    .clickable-cell.expanded {
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        background-color: #f0f8ff;
    }

    .admin-only {
        display: none;
    }

    body .admin-visible {
        display: table-cell;
    }

    /* RESPONSIVE MOBILE */
    @media (max-width: 768px) {
      /* --- SỬA LỖI CUỘN TRANG TRÊN MOBILE (GIỐNG AUTOPLAN) --- */
      
      /* Khóa cuộn toàn bộ trang */
      html, body, html.swal2-height-auto, body.swal2-height-auto {
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }
      
      /* Bật cuộn độc lập cho phần nội dung chính */
      body #pageContent:not([style*="none"]) {
        display: block !important; /* Ghi đè JS để cuộn dọc đúng, nhưng tôn trọng trạng thái Ẩn */
        overflow-y: auto;
        overflow-x: hidden;
        flex: 1 1 auto;
        min-height: 0;
        -webkit-overflow-scrolling: touch;
        padding: 0; 
      }
      
      /* Cố định Menu và Footer */
      body #menu-placeholder,
      body #footer-placeholder {
        flex: 0 0 auto;
        z-index: 100;
      }

      /* Khắc phục lỗi overflow của các thẻ bọc ngăn cản sticky và cuộn */
      body .card-body, body .card {
          display: block !important;
          overflow: visible !important;
          padding-top: 0 !important;
          margin-top: 0 !important;
      }

      body .table-container {
          display: block;
          overflow-x: auto;
          overflow-y: visible;
          -webkit-overflow-scrolling: touch;
          margin-top: 5px; /* Thêm khoảng cách để không bị dính vào search-row */
      }
      
      .table-reports-2 {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }
      
      .table-reports-2 table {
        min-width: 410px !important;
      }
      
      .table-reports-2 #dataTable th,
      .table-reports-2 #dataTable td {
        padding: 4px 2px !important;
        font-size: 11px !important;
      }
      
      /* STT */
      .table-reports-2 #dataTable th:nth-child(1),
      .table-reports-2 #dataTable td:nth-child(1) {
        width: 30px !important;
        min-width: 30px !important;
        max-width: 30px !important;
      }
      
      /* Công ty (cột 3 vì cột 2 là admin-only) */
      .table-reports-2 #dataTable th:nth-child(3),
      .table-reports-2 #dataTable td:nth-child(3) {
        width: 110px !important;
        min-width: 110px !important;
        max-width: 110px !important;
        white-space: normal !important;
        word-wrap: break-word !important;
      }
      
      /* Ngày nghỉ (cột 4) */
      .table-reports-2 #dataTable th:nth-child(4),
      .table-reports-2 #dataTable td:nth-child(4) {
        width: 75px !important;
        min-width: 75px !important;
        max-width: 75px !important;
      }
      
      /* Ghi chú (cột 5) */
      .table-reports-2 #dataTable th:nth-child(5),
      .table-reports-2 #dataTable td:nth-child(5) {
        width: 155px !important;
        min-width: 155px !important;
        max-width: 155px !important;
        white-space: normal !important;
        word-wrap: break-word !important;
      }
      
      /* File/Link (cột 6) */
      .table-reports-2 #dataTable th:nth-child(6),
      .table-reports-2 #dataTable td:nth-child(6) {
        width: 40px !important;
        min-width: 40px !important;
        max-width: 40px !important;
        font-size: 10px !important;
        padding: 2px 1px !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
      }
      
      /* Thời gian (cột 7 - admin-only) */
      .table-reports-2 #dataTable th:nth-child(7),
      .table-reports-2 #dataTable td:nth-child(7) {
        width: 110px !important;
        min-width: 110px !important;
        max-width: 110px !important;
        font-size: 10px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
      }
      
      /* Hành động (cột 8 - admin-only) */
      .table-reports-2 #dataTable th:nth-child(8),
      .table-reports-2 #dataTable td:nth-child(8) {
        width: 65px !important;
        min-width: 65px !important;
        max-width: 65px !important;
        padding: 2px !important;
        overflow: hidden !important;
      }
      
      /* Nút Xóa trong cột Hành động */
      .table-reports-2 #dataTable td:nth-child(8) button {
        font-size: 11px !important;
        padding: 4px 6px !important;
        width: 100% !important;
        max-width: 51px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: clip !important;
      }
      
    }
    
    /* Animation highlight */
    @keyframes highlightOutline {
        0% { outline: 2px solid transparent; box-shadow: none; }
        25% { outline: 3px solid #ff4444; box-shadow: 0 0 20px rgba(255, 68, 68, 0.8); }
        50% { outline: 2px solid transparent; box-shadow: none; }
        75% { outline: 3px solid #ff4444; box-shadow: 0 0 20px rgba(255, 68, 68, 0.8); }
        100% { outline: 2px solid transparent; box-shadow: none; }
    }
    .highlight-area {
        animation: highlightOutline 2s ease-in-out;
        border-radius: 4px;
        outline-offset: 6px;
    }

    /* Giảm khoảng cách dưới menu */
    body nav.navbar {
        margin-bottom: 5px;
    }

    /* --- BẢN SỬA LỖI HIỂN THỊ FOOTER & CUỘN BẢNG (CHỈ ÁP DỤNG DESKTOP) --- */
    @media (min-width: 769px) {
        /* --- TỐI ƯU HÓA KHÔNG GIAN (COMPACT MODE) CHỈ DÀNH CHO DESKTOP --- */
        body h2 {
            margin: 2px 0 5px 0;
            font-size: 1.3rem;
        }
        
        body .filter-box {
            margin: 0 5px 5px 0;
            gap: 5px;
        }
        
        body .search-container {
            margin-bottom: 5px;
        }

        html, body {
            width: 100%;
            height: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        body {
            display: flex;
            flex-direction: column;
            padding: 4px;
            box-sizing: border-box;
        }
        
        body #menu-placeholder, body #footer-placeholder {
            flex: 0 0 auto;
            width: 100%;
            z-index: 100;
        }

        body #pageContent:not([style*="none"]) {
            flex: 1 1 auto !important;
            display: flex !important; /* Tôn trọng trạng thái Ẩn trước khi đăng nhập */
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            width: 100%;
        }

        body .card-body {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            width: 100%;
        }

        body .table-container {
            flex: 1 1 auto; 
            min-height: 0; 
            overflow: auto; 
            -webkit-overflow-scrolling: touch; 
            width: 100%;
        }
    }
  </style>
</head>
<body>
  <div id="menu-placeholder"></div>
  <div id="loading-placeholder"></div>
  <div id="alert-placeholder"></div>

  <div id="notLogged" style="display:none;">
    <a href="trangchu.html">❌ Bạn cần đăng nhập để truy cập trang này.</a>
  </div>

  <div id="pageContent" style="display:none;">
    <h2>📊 Bảng dữ liệu ngày nghỉ </h2>
    <div class="card-body">

    <!-- KHỐI BỌC STICKY TRÊN MOBILE -->
    <div class="sticky-search-filter">
      <div class="filter-box">
        <label>Từ ngày: <input type="date" id="fromDate"></label>
        <label>Đến ngày: <input type="date" id="toDate"></label>
        <label>Năm nhanh:
          <select id="yearSelect">
            <option value="">--Chọn năm--</option>
          </select>
        </label>
        <button id="applyFilter" type="button">Áp dụng</button>
      </div>
      <div class="search-row">
          <div class="search-container" style="flex: 1; margin-bottom: 0 !important;">
              <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm..." style="width: 100%;">
          </div>
          <label class="special-filter-label" title="Chỉ hiển thị các ngày làm việc đặc biệt">
              <input type="checkbox" id="specialWorkdayFilter"> 
              <span class="special-text-long">Chỉ xem Ngày làm đặc biệt</span>
              <span class="special-text-short">Lọc Đặc biệt</span>
          </label>
      </div>
    </div>
        <div class="table-container table-reports-2">
        <table id="dataTable">
          <thead>
            <tr>
              <th>STT</th>
              <th class="admin-only">Người gửi</th>
              <th>Công ty</th>
              <th>Ngày nghỉ</th>
              <th>Ghi chú</th>
              <th>File</th>
              <th class="admin-only">Thời gian</th>
              <th class="admin-only">Hành động</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div style="text-align: center; margin-top: 15px; padding-bottom: 20px;">
            <button id="loadMoreBtn" class="btn-action btn-primary" style="display: none; padding: 8px 20px;">⬇️ Cuộn để tải thêm...</button>
        </div>
        </div>
    </div>
  </div>
<div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script type="module" src="datatable_2.js"></script>
</body>
</html>
