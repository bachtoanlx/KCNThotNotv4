  <!-- Modal đăng nhập -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Đăng nhập</h2>
      <form id="loginForm">
        <input type="email" name="email" placeholder="Email" required autocomplete="username">
        <div style="position: relative; margin: 6px 0;">
          <input type="password" name="password" placeholder="Mật khẩu" required autocomplete="current-password"
            style="margin: 0; padding-right: 35px;">
          <span
            onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.textContent=p.type==='password'?'👁️':'👀';"
            onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6"
            style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none; opacity: 0.6; font-size: 16px; transition: opacity 0.2s;"
            title="Hiện/Ẩn mật khẩu">👁️</span>
        </div>
        <button type="submit">Đăng nhập</button>
      </form>
    </div>
  </div>
