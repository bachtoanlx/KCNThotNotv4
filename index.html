<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gửi báo cáo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <style>
    /* Tinh chỉnh layout để lấp đầy màn hình và bỏ cuộn trang */
    html, body {
        height: 100vh;
        overflow: hidden;
    }

    #pageContent {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
    }
  </style>
</head>

<body>
  <div id="menu-placeholder"></div>
  <div id="loading-placeholder"></div>
  <div id="alert-placeholder"></div>

  <div id="notLogged" style="display:none;">
    <a href="trangchu.html">❌ Bạn cần đăng nhập để truy cập trang này.</a>
  </div>

  <div id="pageContent" style="display:none;">
    <div class="form-style-1">          
        <div class="card-body">
            <form id="registrationForm_1" data-collection="reports_1" data-folder-id="172daCAN-J_TSKBnLvDIzQU_ejbdtLQpB" onsubmit="submitForm(event, this.id, this.dataset.collection, this.dataset.folderId)" style="margin-bottom: 15px;">
                <div class="form-group form-field">
                    <label for="c_ty">Tên Công ty:</label>
                    <select class="form-control" id="c_ty" name="c_ty" required>
                        <option value="" disabled selected>- Đang tải danh sách... -</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                        <div class="form-group form-field" style="flex: 1;">
                        <label for="chi_so">Chỉ số mới:</label>
                        <input type="text" class="form-control" placeholder="Chỉ số đồng hồ..." id="chi_so" name="chi_so" required>
                    </div>
                    <div class="form-group form-field" style="flex: 1;">
                        <label for="chi_so_cu">Chỉ số cũ:</label>
                        <input type="text" class="form-control" placeholder="Chỉ số cũ..." id="chi_so_cu" name="chi_so_cu" readonly style="background-color: #e9ecef; cursor: not-allowed;">
                    </div>

                </div>
                <div class="form-group form-field">
                    <label for="ngay_ghi">Ngày ghi:</label>
                    <input type="date" class="form-control" placeholder=" Ngày, tháng, năm ... " id="ngay_ghi" name="ngay_ghi" required>
                </div>
                <div class="form-group form-field">
                    <label for="ghi_chu">Ghi chú:</label>
                    <textarea class="form-control" placeholder="" id="ghi_chu" name="ghi_chu"></textarea>
                </div>
                <div class="form-group form-field">
                    <label for="file">Chọn hình ảnh</label>
                    <input type="file" id="file" class="form-control-file" accept="image/*" style="display: none;">
                    <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                        <button type="button" id="customFileBtn" style="padding: 6px 12px; border: 1px solid #ced4da; background: #e9ecef; border-radius: 0.25rem; cursor: pointer; font-size: 1rem; color: #495057;">Chọn tệp</button>
                        <span id="customFileName" style="color: #666; font-style: italic; cursor: default;">Không có tệp nào được chọn</span>
                    </div>
                </div>
            </form>
                <div class="form-group text-center">
                    <button type="submit" class="submit-btn" form="registrationForm_1">Gửi thông tin</button>
                </div>    
        </div>
    </div>


</div>
<div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script type="module" src="index.js"></script>
    
</body>
</html>
